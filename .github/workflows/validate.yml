name: Validate Course Module

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Fetch all history so git push works cleanly

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run Module Validation
      run: |
        python validate_module.py

    - name: Rebuild Modules and Registry
      run: |
        python build_all.py

    - name: Commit and Push Compiled Changes
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add content/
        git diff-index --quiet HEAD || (git commit -m "Auto-compile course data and dynamic registry [skip ci]" && git push)
