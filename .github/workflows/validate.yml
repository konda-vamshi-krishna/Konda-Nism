name: Validate Course Module

on:
  pull_request:
    branches: [ master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run Module Validation
      run: |
        python validate_module.py

    - name: Rebuild Modules and Registry
      run: |
        python build_all.py

    - name: Commit and Push Compiled Changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add content/
        git diff-index --quiet HEAD || (git commit -m "Auto-compile course data and dynamic registry [skip ci]" && git push)
